kind = "web"
previewPath = "/"
title = "Privacy Budget"
version = "1.0.0"
id = "artifacts/budget-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24432

[services.development]
run = "pnpm --filter @workspace/budget-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/budget-app", "run", "build" ]
publicDir = "artifacts/budget-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24432"
BASE_PATH = "/"
